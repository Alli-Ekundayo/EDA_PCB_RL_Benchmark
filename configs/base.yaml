board_width: 32
board_height: 32
resolution_mm: 0.5
num_comp_classes: 4
use_ratsnest: true
use_criticality: true
gat_embed_dim: 128
spatial_embed_dim: 128
fused_dim: 256
gat_heads: 4
n_envs: 8
n_steps: 2048
n_epochs: 4
batch_size: 256
clip_range: 0.2
lr: 0.0003
gamma: 0.99
gae_lambda: 0.95
ent_coef: 0.02
vf_coef: 0.5
max_grad_norm: 0.5
component_rotations: 4
total_timesteps: 200000
eval_freq: 5000
checkpoint_freq: 10000
board_dir: data/boards/rl_pcb/base/training.pcb
checkpoint_dir: runs/checkpoints
seed: 42
hpwl_weight: 1.0
drc_penalty: 10.0
routability_weight: 0.1

replay_buffer_size: 25000
expl_noise: 0.1
policy_noise: 0.2
noise_clip: 0.5
policy_freq: 1
tau: 0.005
pi_hidden_sizes: [400, 300]
qf_hidden_sizes: [400, 300]
