# Test-run config: small batches so PPO gets many updates in short timestep budgets.
# Off-policy (TD3/SAC) starts updating after batch_size steps and logs every episode.
board_width: 32
board_height: 32
resolution_mm: 0.5
num_comp_classes: 4
use_ratsnest: true
use_criticality: true
gat_embed_dim: 128
spatial_embed_dim: 128
fused_dim: 256
gat_heads: 4

# PPO: smaller n_steps for more frequent logging (rollout = 4 * 32 = 128 steps)
n_envs: 4
n_steps: 32
n_epochs: 4
batch_size: 64
clip_range: 0.2
lr: 0.0003
gamma: 0.99
gae_lambda: 0.95
ent_coef: 0.02
vf_coef: 0.5
max_grad_norm: 0.5
component_rotations: 4

# Run for enough steps to see a learning curve
total_timesteps: 50000
eval_freq: 5000
checkpoint_freq: 10000
board_dir: data/boards/rl_pcb/base/training.pcb
checkpoint_dir: runs/checkpoints
seed: 42

hpwl_weight: 1.0
drc_penalty: 10.0
routability_weight: 0.1

# Off-policy
replay_buffer_size: 25000
expl_noise: 0.1
policy_noise: 0.2
noise_clip: 0.5
policy_freq: 1
tau: 0.005
alpha: 0.2
pi_hidden_sizes: [256, 256]
qf_hidden_sizes: [256, 256]
